<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login no sistema de Gerenciamento de Biblioteca Pessoal.">
    <title>Login — Minha Biblioteca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Layout centralizado exclusivo da página de login */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338CA 100%);
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 2.5rem 2.5rem 2rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .login-logo .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .login-logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0F172A;
            margin-bottom: 0.2rem;
        }

        .login-logo p {
            color: #64748B;
            font-size: 0.9rem;
        }

        .login-card .input-group {
            margin-bottom: 1.1rem;
        }

        .login-card label {
            font-size: 0.9rem;
        }

        #login-error {
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .btn-login {
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
            color: white;
            border: none;
            padding: 0.9rem 1.5rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            transition: opacity 0.2s, transform 0.1s;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .btn-login:hover  { opacity: 0.92; }
        .btn-login:active { transform: scale(0.98); }

        .login-hint {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: #94a3b8;
        }

        .login-hint code {
            background: #f1f5f9;
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            color: #475569;
            font-size: 0.82rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <span class="icon">📚</span>
                <h1>Minha Biblioteca</h1>
                <p>Faça login para acessar seu acervo</p>
            </div>

            <div id="login-error">Usuário ou senha incorretos.</div>

            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <input
                        type="text"
                        id="usuario"
                        placeholder="Digite seu usuário"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input
                        type="password"
                        id="senha"
                        placeholder="Digite sua senha"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" id="btnLogin" class="btn-login">Entrar</button>
            </form>

            <p class="login-hint">
                Credenciais padrão: usuário <code>admin</code> / senha <code>1234</code>
            </p>
        </div>
    </div>

    <script>
        // Se já estiver logado, redireciona direto para o app
        fetch('/api/auth/me', { credentials: 'include' })
            .then(r => r.json())
            .then(data => {
                if (data.logado) window.location.href = '/dashboard.html';
            })
            .catch(() => {});

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const usuario = document.getElementById('usuario').value.trim();
            const senha   = document.getElementById('senha').value;
            const btn     = document.getElementById('btnLogin');
            const erro    = document.getElementById('login-error');

            btn.textContent = 'Entrando...';
            btn.disabled = true;
            erro.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ usuario, senha })
                });

                const data = await res.json();

                if (res.ok) {
                    // Login bem-sucedido → vai para o app
                    window.location.href = '/dashboard.html';
                } else {
                    erro.textContent = data.error || 'Usuário ou senha incorretos.';
                    erro.style.display = 'block';
                    btn.textContent = 'Entrar';
                    btn.disabled = false;
                }
            } catch (err) {
                erro.textContent = 'Erro de conexão com o servidor.';
                erro.style.display = 'block';
                btn.textContent = 'Entrar';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
